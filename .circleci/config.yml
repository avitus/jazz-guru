# CircleCI config for jazz-guru.
#
# Tests run against a real Postgres + pgvector container — the Tier-2
# dynamic-tool tests (store versioning, tool_test_meta, improver, etc.)
# round-trip through the database. The one extra binary dep is
# libsndfile, used by `soundfile` in test_audio.
#
# To enable: in CircleCI, "Set Up Project" against this repo and pick the
# "Use existing config" option pointing at this file.

version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.12
        environment:
          # asyncpg requires explicit host/port/user/password; the default
          # socket-style URLs in config.py won't find anything in CI.
          DATABASE_URL: postgresql+asyncpg://jazz_guru:jazz_guru@localhost:5432/jazz_guru
          DATABASE_URL_SYNC: postgresql+psycopg://jazz_guru:jazz_guru@localhost:5432/jazz_guru
          # Tests don't make LLM calls (they stub ``llm.complete``), but
          # config.py warns if ANTHROPIC_API_KEY is unset.
          ANTHROPIC_API_KEY: stub-not-used
      - image: pgvector/pgvector:pg15
        environment:
          POSTGRES_USER: jazz_guru
          POSTGRES_PASSWORD: jazz_guru
          POSTGRES_DB: jazz_guru
    resource_class: small
    steps:
      - checkout

      - run:
          name: System packages
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends libsndfile1 postgresql-client

      - restore_cache:
          keys:
            - v1-pip-{{ checksum "pyproject.toml" }}
            - v1-pip-

      - run:
          name: Install project (editable, with dev extras)
          command: |
            python -m venv .venv
            .venv/bin/pip install --upgrade pip
            .venv/bin/pip install -e ".[dev]"

      - save_cache:
          # Cache only the pip wheel cache, not the venv itself: cached
          # `.venv` directories can become brittle across base-image or
          # python patch updates (paths embedded in shebangs / .pyc, etc.).
          # Wheels are portable enough and re-installs are fast.
          key: v1-pip-{{ checksum "pyproject.toml" }}
          paths:
            - ~/.cache/pip

      - run:
          name: Wait for Postgres
          command: |
            for i in $(seq 1 30); do
              if pg_isready -h localhost -p 5432 -U jazz_guru >/dev/null 2>&1; then
                echo "Postgres is ready"
                exit 0
              fi
              echo "Waiting for Postgres ($i/30)..."
              sleep 1
            done
            echo "Postgres did not become ready in time" >&2
            exit 1

      - run:
          name: Run migrations
          command: .venv/bin/alembic upgrade head

      - run:
          name: Ruff lint
          command: .venv/bin/ruff check src tests

      - run:
          name: Mypy type check
          command: .venv/bin/mypy src

      - run:
          name: Pytest
          command: |
            mkdir -p test-results
            .venv/bin/pytest -q --junitxml=test-results/pytest.xml

      - store_test_results:
          path: test-results

workflows:
  ci:
    jobs:
      - test
