version: 1
default: allow
auto_approve: true
default_max_result_bytes: 10000

tools:
  fs_read:        { mode: allow, max_result_bytes: 4000 }
  fs_write:       { mode: allow, scope: workspace }
  fs_list:        { mode: allow }
  shell:          { mode: allow, timeout_sec: 60, max_result_bytes: 4000 }
  http_get:       { mode: allow, max_result_bytes: 8000 }
  http_post:      { mode: allow, max_result_bytes: 8000 }
  python_exec:    { mode: allow, timeout_sec: 30, mem_mb: 512, max_result_bytes: 4000 }
  code_gen:       { mode: allow, scope: workspace }
  code_edit:      { mode: allow, scope: workspace }
  patch:          { mode: allow, scope: workspace }
  web_search:     { mode: allow }
  vision:         { mode: allow }
  audio_analyze:  { mode: allow }
  music_xml:      { mode: allow }
  midi:           { mode: allow }
  render_midi:    { mode: allow }
  tts:            { mode: allow, feature_flag: FEATURE_TTS }

  # --- meta-tools: agent-authored tool creation ---------------------------
  tool_create:           { mode: allow }
  tool_publish:          { mode: allow }
  tool_promote_to_source: { mode: allow }
  tool_remove:           { mode: allow }
  tool_list_dynamic:     { mode: allow }
  tool_inspect:          { mode: allow }

  # --- notes: always-loaded persistent facts ------------------------------
  notes_read:            { mode: allow }
  notes_write:           { mode: allow }
  notes_patch:           { mode: allow }

  # --- productivity tools -------------------------------------------------
  process:               { mode: allow }
  todo:                  { mode: allow }
  clarify:               { mode: allow }
  session_search:        { mode: allow }

  # --- skills: SKILL.md procedural memory ---------------------------------
  skills_list:           { mode: allow }
  skill_view:            { mode: allow }
  skill_manage:          { mode: allow }

  # --- subagent delegation ------------------------------------------------
  delegate_task:         { mode: allow }

# Loose toolset bundling. Resolution order in Policy.for_tool:
#   per-name `tools.<name>` entry  ->  toolset that contains the name  ->  default.
# Per-tool entries above already exist for every built-in; the toolsets section
# is what governs newly-added tools (e.g. preset_*) and lets you flip a whole
# family on or off with one line.
toolsets:
  core:    { tools: [info, ping], mode: allow }
  fs:      { tools: [fs_read, fs_write, fs_list], mode: allow }
  shell:   { tools: [shell, python_exec], mode: allow }
  web:     { tools: [http_get, http_post, web_search], mode: allow }
  code:    { tools: [code_gen], mode: allow }
  music:   { tools: [music_xml, midi, render_midi, preset_list, preset_get, preset_upsert, preset_delete], mode: allow }
  audio:   { tools: [audio_analyze, tts], mode: allow }
  vision:  { tools: [vision], mode: allow }
  meta:    { tools: [tool_create, tool_publish, tool_remove, tool_promote_to_source, tool_list_dynamic, tool_inspect], mode: allow }

budgets:
  per_turn:
    tool_calls: 32
    wall_clock_sec: 300
  per_session:
    tokens: 2_000_000
    usd: 10.0
